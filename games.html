<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | Project Web</title>
    <link href="dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body data-page="games" class="font-sans antialiased text-corporate-dark bg-white flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="w-full">
        <!-- Hero -->
        <section class="text-center py-16 px-6">
            <h1 class="text-4xl font-medium mb-4">Games<br> Interactive</h1>
            <p class="text-gray-500 text-lg max-w-2xl mx-auto">Juegos inmersivos diseñados para la web moderna. Sin
                descargas, todo en tu navegador.</p>
        </section>

        <!-- Dark Section -->
        <section class="bg-black py-16 text-white text-center">
            <div class="max-w-[1200px] mx-auto px-6">
                <!-- Impostor Game -->
                <!--
                <div class="mb-20">
                    <h2 class="text-3xl font-medium text-white mb-8 border-b border-gray-700 pb-4 inline-block">Featured
                        Game</h2>
                </div>
-->
                <!-- Coming Soon -->
                <div>
                    <h2 class="text-2xl font-medium text-gray-500 mb-8 uppercase tracking-widest">Coming Soon</h2>

                    <div
                        class="max-w-md mx-auto bg-gray-800 rounded-xl overflow-hidden border border-gray-700 hover:border-corporate-blue transition-all group">
                        <div class="relative h-64">
                            <img src="img/impostor.webp" alt="Impostor" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/50 group-hover:bg-black/20 transition-colors"></div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-2xl font-bold mb-3 text-white">Impostor</h3>
                            <p class="text-gray-400 mb-6">Find the impostor before it's too late. A game of deduction
                                and deception.</p>
                            <a href="#"
                                class="inline-block w-full py-3 bg-corporate-blue text-white rounded font-medium hover:bg-blue-600 transition-colors">Play
                                Soon</a>
                        </div>
                    </div>

                    <br>

                    <div class="max-w-md mx-auto bg-gray-900/50 rounded-xl p-6 border border-gray-800 dashed border-2">
                        <h3 class="text-xl font-medium text-gray-400 mb-2">2 Fast 2 Talk</h3>
                        <p class="text-gray-600 text-sm">Get ready for speed and chaos.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
