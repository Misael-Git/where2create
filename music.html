<!DOCTYPE html>
<html lang="es">

<body data-page="music">

            <div style="text-align: left;">
                <div
                    style="background: #f1f3f4; height: 200px; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #dadce0;">

            </div>

            <div style="text-align: left;">
                <div
                    style="background: #f1f3f4; height: 200px; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #dadce0;">

                    style="background: #f1f3f4; height: 200px; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #dadce0;">

        </div>

    </main>

    <div id="footer-placeholder"></div>
    <script type="module" src="js/main.js"></script>

</html>
