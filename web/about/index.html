<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About me | Project Web</title>
    <link href="../dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body data-page="about" class="font-sans antialiased text-corporate-dark bg-white flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="max-w-[1200px] mx-auto px-6 w-full py-12">
        <section class="mb-16 text-center md:text-left">
            <h1 class="text-4xl font-medium mb-4">About <span class="text-corporate-blue">Me</span></h1>
        </section>

        <div class="flex flex-col items-center text-center gap-12">
            <!-- Big Text -->
            <h2 class="text-5xl md:text-6xl font-bold text-gray-900 leading-tight">
                Don't like to read,<br><span class="text-corporate-orange">so see me.</span>
            </h2>

            <!-- Image -->
            <div class="w-full max-w-2xl">
                <div class="aspect-square md:aspect-video rounded-3xl overflow-hidden shadow-2xl">
                    <img src="../img/bebe.webp" alt="Childhood photo" class="w-full h-full object-cover">
                </div>
            </div>

            <p class="text-gray-500 mt-8">( Pictures speak louder than words )</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script type="module" src="../js/main.js"></script>
</body>

</html>
