<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps | W2C</title>
    <link href="../dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/img/LOGO.png">
</head>

<body data-page="apps" class="font-sans antialiased text-text-light bg-bg-dark flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="w-full">
        <!-- Standardized Typography Header -->
        <section class="max-w-[1200px] mx-auto px-6 py-12">
            <div class="mb-16 text-center md:text-left">
                <h1 class="text-4xl font-medium mb-4">Apps & <span class="text-corporate-blue-light">Tools</span></h1>
            </div>

            <div class="flex flex-col items-center text-center gap-12 mb-16">
                <!-- Big Text -->
                <h2 class="text-5xl md:text-6xl font-bold text-text-light leading-tight">
                    Productivity,<br><span class="text-corporate-orange-light">for the modern web.</span>
                </h2>
                <p class="text-gray-light mt-6 text-lg max-w-2xl">( High performance tools that live in your tab. )</p>
            </div>

            <!-- Standardized Grid (Kraken Style) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-[1200px] mx-auto mb-16">
                <!-- App 1: Fill and Sign -->
                <div class="group relative overflow-hidden rounded-2xl bg-black h-[400px] shadow-lg">
                    <img src="../img/apps.webp" alt="Fill and Sign"
                        class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-90">
                    </div>
                    <div
                        class="absolute bottom-0 left-0 w-full p-8 translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
                        <span
                            class="text-corporate-orange-light font-bold tracking-wider text-xs uppercase mb-2 block">UTILITY</span>
                        <h3 class="text-white text-3xl font-bold mb-3">Fill and Sign</h3>
                        <a href="#"
                            class="text-white border-b border-corporate-orange-light pb-1 hover:text-corporate-orange-light transition-colors">Apply
                            Soon</a>
                    </div>
                </div>

                <!-- App 2: Web 2 App -->
                <div class="group relative overflow-hidden rounded-2xl bg-black h-[400px] shadow-lg">
                    <div class="w-full h-full bg-blue-900/20 flex items-center justify-center text-8xl">🌐</div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-90">
                    </div>
                    <div
                        class="absolute bottom-0 left-0 w-full p-8 translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
                        <span
                            class="text-corporate-blue-light font-bold tracking-wider text-xs uppercase mb-2 block">DEVELOPMENT</span>
                        <h3 class="text-white text-3xl font-bold mb-3">Web 2 App</h3>
                        <a href="#"
                            class="text-white border-b border-corporate-blue-light pb-1 hover:text-corporate-blue-light transition-colors">Apply
                            Soon</a>
                    </div>
                </div>
            </div>
        </section>

        <div id="carousel-placeholder"></div>
    </main>

    <div id="footer-placeholder"></div>
    <script type="module" src="../js/main.js"></script>
</body>

</html>
