<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Project Web</title>
    <link href="../dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body data-page="contact" class="font-sans antialiased text-corporate-dark bg-white flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="max-w-[1200px] mx-auto px-6 w-full py-12 flex-grow flex flex-col">
        <section class="mb-16 text-center md:text-left">
            <h1 class="text-4xl font-medium mb-4">Get in <span class="text-corporate-orange">Touch</span></h1>
        </section>

        <div class="flex-grow flex flex-col items-center text-center gap-12">
            <h2 class="text-5xl md:text-6xl font-bold text-gray-900 leading-tight">
                Start the conversation.<br><span class="text-gray-400">We are listening.</span>
            </h2>

            <!-- Mail Link -->
            <a href="mailto:contact@where2create.com"
                class="text-2xl md:text-3xl font-bold text-corporate-blue hover:text-blue-700 transition-colors mb-16 border-b-2 border-transparent hover:border-blue-700 pb-1">
                contact@where2create.com
            </a>
        </div>

        <!-- FAQ Placeholder -->
        <div class="max-w-xl mx-auto w-full">
            <h2 class="text-xl font-medium text-gray-400 mb-6 uppercase tracking-wider">FAQ</h2>
            <div class="p-8 border border-gray-200 border-dashed rounded-xl bg-gray-50 text-gray-500 italic">
                "Start asking, and this will grow."
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>
    <script type="module" src="../js/main.js"></script>
</body>

</html>
