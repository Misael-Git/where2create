<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | W2C</title>
    <link href="../dist/output.css" rel="stylesheet">
    <link href="../css/modern.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="../img/LOGO.png">
</head>

<body data-page="games" class="bg-black">

    <div class="bg-glow"></div>
    <div id="header-placeholder"></div>

    <main class="page-header-padding">
        <section class="section-gap">
            <div class="container-l animate-in">
                <span class="tag">Browser Entertainment</span>
                <h1 class="max-w-4xl">In-browser fun<br><span class="text-gradient italic font-light lowercase">crafted
                        for play.</span></h1>
                <p class="desc mt-8">No downloads. No waiting. Just immersive interactive experiences designed for the
                    modern web browser.</p>
            </div>
        </section>

        <section class="section-gap">
            <div class="container-l">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

                    <a href="impostor/index.html" class="attraction-card group animate-in">
                        <img src="../img/impostor.webp" alt="Impostor"
                            class="absolute inset-0 w-full h-full object-cover grayscale opacity-40 group-hover:scale-105 group-hover:opacity-80 transition-all duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                        <div class="absolute bottom-0 left-0 p-12 w-full">
                            <span class="tag !text-white !mb-2 !text-[10px]">Social Deduction</span>
                            <h3 class="mb-4 group-hover:text-blue-500 transition-colors text-white">Impostor</h3>
                            <p
                                class="text-[15px] text-gray-400 opacity-0 group-hover:opacity-100 transition-all duration-500 max-w-sm font-light">
                                Uncover the truth in this high-stakes interactive mystery game.</p>
                        </div>
                    </a>

                    <div class="attraction-card border-dashed border-white/5 bg-zinc-950 flex items-center justify-center p-12 text-center opacity-40 animate-in"
                        style="animation-delay: 0.1s">
                        <div>
                            <span class="tag !mb-4">Project 02</span>
                            <h3 class="text-2xl mb-2">2 Fast 2 Talk</h3>
                            <p class="text-sm text-gray-500">Coming soon.</p>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <div id="carousel-placeholder" class="section-gap"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/header.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/carousel-loader.js"></script>
    <script src="../js/accordion.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
