<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Games Guide | W2C</title>
    <link href="../../dist/output.css" rel="stylesheet">
    <link href="../../css/modern.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../../img/LOGO.png">
</head>

<body data-page="games-detail">

    <div class="bg-glow"></div>
    <div id="header-placeholder"></div>

    <main class="w-full">
        <section class="container-wide py-32 mt-20">
            <div class="mb-20 text-center animate-fade-in">
                <span class="text-[10px] font-bold tracking-[0.4em] uppercase text-sky-500 mb-4 block">Fun with
                    friends</span>
                <h1 class="text-6xl md:text-8xl font-bold text-white tracking-tighter leading-tight mb-12">
                    PARTY GAMES<br><span class="text-gradient-primary italic">GUIDE.</span>
                </h1>
            </div>

            <div class="max-w-4xl mx-auto space-y-12">
                <article class="glass p-12 rounded-[3rem] animate-fade-in">
                    <h3 class="text-3xl font-bold text-white mb-6 italic">Featured: Eeee Oooo</h3>
                    <p class="text-xl text-gray-400 font-light leading-relaxed">
                        One person leaves the room while the group chooses a specific task for them to perform.
                        When they return, the group guides them using only sounds: "Eeee" for closer, "Oooo" for
                        farther.
                    </p>
                </article>

                <div class="text-center py-12">
                    <p class="text-gray-500 italic">More guides coming soon...</p>
                </div>
            </div>
        </section>

        <div id="carousel-placeholder"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/header.js"></script>
    <script src="../../js/footer.js"></script>
    <script src="../../js/carousel-loader.js"></script>
    <script src="../../js/accordion.js"></script>
    <script src="../../js/main.js"></script>
</body>

</html>
