<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrills | W2C</title>
    <link href="../dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="icon" type="image/png" href="/img/LOGO.png">
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: #1a1a1a;
            color: white;
        }

        .leaflet-popup-tip {
            background: #1a1a1a;
        }

        body .leaflet-tile-pane {
            /* filter: invert(70%) hue-rotate(180deg) brightness(120%) contrast(200%); */
            /* filter: brightness(100%) contrast(110%); */
            filter: brightness(158%) contrast(150%);
        }

        /* Oscurecer controles de Leaflet */
        .leaflet-control-zoom a,
        .leaflet-control-attribution {
            background-color: #2a2a2a !important;
            color: #b0b0b0 !important;
            border-color: #3a3a3a !important;
        }

        .leaflet-control-zoom a:hover {
            background-color: #3a3a3a !important;
        }

        .leaflet-control-attribution a {
            color: #5c9ef5 !important;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1383054634086783"
        crossorigin="anonymous"></script>
</head>

<body data-page="thrills" class="font-sans antialiased text-text-light bg-bg-dark flex flex-col min-h-screen"
    onload="initMap()">

    <div id="header-placeholder"></div>

    <main class="w-full flex-1">

        <!-- SECTION 1: Ride Concepts -->
        <section class="bg-bg-dark py-16">


            <div class="max-w-[1200px] mx-auto px-6">
                <!-- Typography Style: Small H1 left, Big text below -->
                <div class="mb-12 text-center md:text-left">
                    <h1 class="text-4xl font-medium mb-4">Thrills <span class="text-corporate-blue-light">&amp;
                            Rides</span>
                    </h1>
                </div>
                <div class="mb-12 text-center md:text-left">
                    <h2 class="text-5xl md:text-6xl font-bold text-text-light leading-tight">
                        Conceptual designs<br><span class="text-gray-light">that push boundaries.</span>
                    </h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Concept 1: The Kraken -->
                    <div class="group relative overflow-hidden rounded-2xl bg-black h-[400px] shadow-lg">
                        <img src="../img/kraken.webp" alt="The Kraken"
                            class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-90">
                        </div>
                        <div
                            class="absolute bottom-0 left-0 w-full p-8 translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
                            <span
                                class="text-corporate-blue-light font-bold tracking-wider text-xs uppercase mb-2 block">DEEP
                                SEA</span>
                            <h3 class="text-white text-3xl font-bold mb-3">The Kraken</h3>
                            <a href="kraken/"
                                class="text-white border-b border-corporate-blue-light pb-1 hover:text-corporate-blue-light transition-colors">View
                                Details</a>
                        </div>
                    </div>

                    <!-- Concept 2: The Mermaid -->
                    <div class="group relative overflow-hidden rounded-2xl bg-black h-[400px] shadow-lg">
                        <img src="../img/mermaid.webp" alt="The Mermaid"
                            class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-90">
                        </div>
                        <div
                            class="absolute bottom-0 left-0 w-full p-8 translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
                            <span
                                class="text-corporate-orange-light font-bold tracking-wider text-xs uppercase mb-2 block">DEEP
                                SEA</span>
                            <h3 class="text-white text-3xl font-bold mb-3">The Mermaid</h3>
                            <a href="mermaid/"
                                class="text-white border-b border-corporate-orange-light pb-1 hover:text-corporate-orange-light transition-colors">View
                                Details</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Interstitial Ad Unit -->
        <div class="max-w-[1200px] mx-auto py-8 text-center">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1383054634086783"
                data-ad-slot="6280054968" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <section class="max-w-[1200px] mx-auto px-6 mt-12 mb-16">

            <div class="flex flex-col md:flex-row md:items-end md:justify-between mb-8 gap-6">
                <div class="text-center md:text-left">
                    <h2 class="text-5xl md:text-6xl font-bold text-text-light leading-tight">
                        Real locations,<br><span class="text-gray-light">unreal experiences.</span>
                    </h2>
                </div>
                <div class="text-center md:text-right">
                    <a href="http://coaster.where2create.com" target="_blank"
                        class="inline-block px-8 py-4 bg-corporate-blue text-white rounded-lg font-bold text-lg hover:bg-blue-600 transition-all shadow-lg hover:scale-105 active:scale-95">
                        Compare Prices &amp; Stats
                    </a>
                </div>
            </div>

            <!-- Map: Mobile height reduced to ~375px (3/4 of 500), Desktop fixed 500px -->
            <div id="map" class="w-full h-[375px] md:h-[500px] rounded-lg z-0 shadow-xl overflow-hidden mb-8">
            </div>

            <script>
                function initMap() {
                    if (!document.getElementById('map')) return;

                    var map = L.map('map').setView([40.4168, -3.7038], 5);

                    map.scrollWheelZoom.disable();

                    // Restore CARTO Dark Tiles
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        maxZoom: 5,
                        minZoom: 5,
                        attribution: '&copy; OpenStreetMap &copy; CARTO'
                    }).addTo(map);

                    // Marker 1
                    var coaster1 = L.marker([41.08, 1.15]).addTo(map);
                    coaster1.bindPopup("<b>Red Force Clone</b><br><a href='#' class='text-corporate-blue font-bold hover:underline'>View Project</a>");

                    // Marker 2
                    var coaster2 = L.marker([52.98, -2.44]).addTo(map);
                    coaster2.bindPopup("<b>The Smiler Legacy</b><br><a href='#' class='text-corporate-blue font-bold hover:underline'>View Project</a>");
                }
            </script>
        </section>

        <div id="carousel-placeholder"></div>
    </main>

    <!-- Multiplex Ad Unit -->
    <div class="max-w-[1200px] mx-auto px-6 py-8">
        <ins class="adsbygoogle" style="display:block" data-ad-format="autorelaxed"
            data-ad-client="ca-pub-1383054634086783" data-ad-slot="8274844678"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module" src="../js/main.js"></script>
</body>

</html>
