<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kraken | Where 2 Create</title>
    <link href="../../dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body data-page="thrills" class="font-sans antialiased text-corporate-dark bg-white flex flex-col min-h-screen">
    <div id="header-placeholder"></div>
    <main class="w-full flex-1">
        <div class="h-[60vh] relative">
            <img src="../../img/kraken.webp" alt="The Kraken" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
            <div class="absolute bottom-0 left-0 p-12">
                <h1 class="text-6xl font-bold text-white mb-4">The Kraken</h1>
                <p class="text-xl text-corporate-blue">Deep Sea Terror Coaster</p>
            </div>
        </div>
        <div class="max-w-[1200px] mx-auto px-6 py-16">
            <p class="text-xl text-gray-600 leading-relaxed max-w-3xl">
                A conceptual ride exploring the darkest depths of the ocean.
                Features vertical drops into "abyssal" tunnels and bioluminescent thematic elements.
            </p>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script type="module" src="../../js/main.js"></script>
</body>

</html>
